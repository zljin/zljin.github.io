r><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br><span class="line">91</span><br><span class="line">92</span><br><span class="line">93</span><br><span class="line">94</span><br><span class="line">95</span><br><span class="line">96</span><br><span class="line">97</span><br><span class="line">98</span><br><span class="line">99</span><br><span class="line">100</span><br><span class="line">101</span><br><span class="line">102</span><br><span class="line">103</span><br><span class="line">104</span><br><span class="line">105</span><br><span class="line">106</span><br><span class="line">107</span><br><span class="line">108</span><br><span class="line">109</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">/**</span></span><br><span class="line"><span class="comment"> * 基础知识:1.函数的定义使用</span></span><br><span class="line"><span class="comment"> */</span></span><br><span class="line"><span class="comment">//函数的几个定义</span></span><br><span class="line">		<span class="comment">//1.函数的声明方式</span></span><br><span class="line">		<span class="function"><span class="keyword">function</span> <span class="title">sum</span>(<span class="params"></span>)</span>&#123;</span><br><span class="line">			<span class="built_in">console</span>.log(<span class="number">1</span>+<span class="number">3</span>);</span><br><span class="line">		&#125;</span><br><span class="line">		sum();</span><br><span class="line">		<span class="comment">//2.函数表达式声明方式</span></span><br><span class="line">		<span class="keyword">var</span> add = <span class="function"><span class="keyword">function</span>(<span class="params"></span>)</span>&#123;</span><br><span class="line">			<span class="built_in">console</span>.log(<span class="number">1</span>+<span class="number">4</span>);</span><br><span class="line">		&#125;</span><br><span class="line">		add();</span><br><span class="line">		<span class="comment">//前面两个的区别</span></span><br><span class="line">		<span class="comment">/*</span></span><br><span class="line"><span class="comment">		 * 在js中解析器首先会把当前作用域</span></span><br><span class="line"><span class="comment">		 * 的函数声明提前到整个作用域的最前面</span></span><br><span class="line"><span class="comment">		 */</span></span><br><span class="line">		</span><br><span class="line">		<span class="comment">//3.使用Function构造函数</span></span><br><span class="line">		<span class="keyword">var</span> add2 = <span class="keyword">new</span> <span class="built_in">Function</span>(<span class="string">'console.log(1+5);'</span>);</span><br><span class="line">        add2();</span><br><span class="line">        </span><br><span class="line">        <span class="comment">//arguments对象</span></span><br><span class="line">		<span class="function"><span class="keyword">function</span> <span class="title">sum</span>(<span class="params"></span>)</span>&#123;</span><br><span class="line">			<span class="comment">//arguments 对象(函数内置对象):获取外部所传的所有参数都会传到arguments数组中</span></span><br><span class="line">			<span class="comment">//arguments包含外部所有参数</span></span><br><span class="line">			<span class="comment">//console.log(arguments);</span></span><br><span class="line">			<span class="keyword">var</span> sum=<span class="number">0</span>;</span><br><span class="line">			<span class="keyword">for</span>(<span class="keyword">var</span> i=<span class="number">0</span>;i&lt;<span class="built_in">arguments</span>.length;i++)&#123;</span><br><span class="line">				sum+=<span class="built_in">arguments</span>[i];</span><br><span class="line">			&#125;</span><br><span class="line">			<span class="built_in">console</span>.log(sum);</span><br><span class="line">		&#125;</span><br><span class="line">        sum(<span class="number">10</span>,<span class="number">20</span>,<span class="number">30</span>);</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">        <span class="comment">//匿名函数:没有匿名的函数</span></span><br><span class="line">		<span class="comment">//作用:定时器,绑定事件,自调用函数</span></span><br><span class="line">		<span class="comment">//自调用函数</span></span><br><span class="line">		(<span class="function"><span class="keyword">function</span>(<span class="params"></span>)</span>&#123;</span><br><span class="line">			alert(<span class="string">"真的会自动执行吗???"</span>);</span><br><span class="line">		&#125;)();</span><br><span class="line">		<span class="comment">//绑定事件</span></span><br><span class="line">		<span class="built_in">document</span>.onclick = <span class="function"><span class="keyword">function</span>(<span class="params"></span>)</span>&#123;</span><br><span class="line">			alert(<span class="string">"点我干嘛?"</span>);</span><br><span class="line">		&#125;</span><br><span class="line">		<span class="comment">//定时器</span></span><br><span class="line">		setInterval(<span class="function"><span class="keyword">function</span>(<span class="params"></span>)</span>&#123;</span><br><span class="line">			<span class="built_in">console</span>.log(<span class="string">"XXOO"</span>);</span><br><span class="line">		&#125;,<span class="number">1000</span>)</span><br><span class="line">		</span><br><span class="line">		<span class="comment">/*</span></span><br><span class="line"><span class="comment">		实现一个打点计时器，要求</span></span><br><span class="line"><span class="comment">		1、从 start 到 end（包含 start 和 end），每隔 100 毫秒 console.log 一个数字，每次数字增幅为 1</span></span><br><span class="line"><span class="comment">		2、返回的对象中需要包含一个 cancel 方法，用于停止定时操作</span></span><br><span class="line"><span class="comment">		3、第一个数需要立即输出</span></span><br><span class="line"><span class="comment">		*/</span></span><br><span class="line">		<span class="function"><span class="keyword">function</span> <span class="title">count</span>(<span class="params">start, end</span>) </span>&#123;</span><br><span class="line">			<span class="built_in">console</span>.log(start++);</span><br><span class="line">			<span class="keyword">var</span> timer = setInterval (<span class="function"><span class="keyword">function</span> (<span class="params"></span>)</span>&#123;</span><br><span class="line">				<span class="keyword">if</span>(start&lt;=end)&#123;</span><br><span class="line">					<span class="built_in">console</span>.log(start++);</span><br><span class="line">				&#125;<span class="keyword">else</span>&#123;</span><br><span class="line">					clearInterval(timer);</span><br><span class="line">				&#125;</span><br><span class="line">			&#125;,<span class="number">100</span>);</span><br><span class="line">			<span class="keyword">return</span> &#123;</span><br><span class="line">				cancel : <span class="function"><span class="keyword">function</span>(<span class="params"></span>)</span>&#123;</span><br><span class="line">					clearInterval(timer);</span><br><span class="line">				&#125;</span><br><span class="line">			&#125;</span><br><span class="line">		&#125;</span><br><span class="line">        <span class="comment">//回调函数:通过一个函数去调用另一个函数(一般用于递归)</span></span><br><span class="line">		<span class="comment">//总控方法</span></span><br><span class="line">		<span class="function"><span class="keyword">function</span> <span class="title">fn</span>(<span class="params">num1,num2,func</span>)</span>&#123;</span><br><span class="line">			<span class="keyword">return</span> func(num1,num2);</span><br><span class="line">		&#125;</span><br><span class="line">		<span class="comment">//加减乘除函数</span></span><br><span class="line">		<span class="function"><span class="keyword">function</span> <span class="title">add</span>(<span class="params">a,b</span>)</span>&#123;</span><br><span class="line">			<span class="keyword">return</span> a+b;</span><br><span class="line">		&#125;</span><br><span class="line">		<span class="function"><span class="keyword">function</span> <span class="title">sub</span>(<span class="params">a,b</span>)</span>&#123;</span><br><span class="line">			<span class="keyword">return</span> a-b;</span><br><span class="line">		&#125;</span><br><span class="line">		<span class="function"><span class="keyword">function</span> <span class="title">mul</span>(<span class="params">a,b</span>)</span>&#123;</span><br><span class="line">			<span class="keyword">return</span> a*b;</span><br><span class="line">		&#125;</span><br><span class="line">		<span class="function"><span class="keyword">function</span> <span class="title">divide</span>(<span class="params">a,b</span>)</span>&#123;</span><br><span class="line">			<span class="keyword">return</span> a/b;</span><br><span class="line">		&#125;</span><br><span class="line">		<span class="built_in">console</span>.log(fn(<span class="number">10</span>,<span class="number">20</span>,add));</span><br><span class="line">		</span><br><span class="line">		<span class="comment">//递归用法</span></span><br><span class="line">		<span class="function"><span class="keyword">function</span> <span class="title">fi</span>(<span class="params">n</span>)</span>&#123;</span><br><span class="line">			<span class="keyword">if</span>(n==<span class="number">1</span>||n==<span class="number">2</span>) <span class="keyword">return</span> <span class="number">1</span>;</span><br><span class="line">			<span class="keyword">return</span> fi(n<span class="number">-1</span>)+fi(n<span class="number">-2</span>);</span><br><span class="line">		&#125;</span><br><span class="line">		</span><br><span class="line">		<span class="built_in">console</span>.log(fi(<span class="number">9</span>));</span><br><span class="line">		</span><br><span class="line">		<span class="comment">//求n个累加</span></span><br><span class="line">		<span class="function"><span class="keyword">function</span> <span class="title">getSum</span>(<span class="params">n</span>)</span>&#123;</span><br><span class="line">			<span class="keyword">if</span>(<span class="number">1</span>==n) <span class="keyword">return</span> <span class="number">1</span>;</span><br><span class="line">			<span class="keyword">return</span> n+<span class="built_in">arguments</span>.callee(n<span class="number">-1</span>);</span><br><span class="line">		&#125;</span><br><span class="line">		</span><br><span class="line">		<span class="built_in">console</span>.log(getSum(<span class="number">100</span>));</span><br></pre></td></tr></table></figure>

><br><span class="line">&#125;</span><br><span class="line"><span class="comment">//2.局部作用域</span></span><br><span class="line"><span class="function"><span class="keyword">function</span> <span class="title">foo</span>(<span class="params"></span>) </span>&#123;</span><br><span class="line">    <span class="keyword">for</span> (<span class="keyword">var</span> i=<span class="number">0</span>; i&lt;<span class="number">100</span>; i++) &#123;</span><br><span class="line">        <span class="comment">//</span></span><br><span class="line">    &#125;</span><br><span class="line">    i += <span class="number">100</span>; <span class="comment">// 仍然可以引用变量i:因为js没有块级作用域,i不会随着for循环的结束而销毁(区别于java,c)</span></span><br><span class="line">    <span class="built_in">console</span>.log(i);</span><br><span class="line">&#125;</span><br><span class="line"><span class="comment">//为了解决块级作用域，ES6引入了新的关键字let，用let替代var可以申明一个块级作用域的变量</span></span><br><span class="line"><span class="function"><span class="keyword">function</span> <span class="title">foo1</span>(<span class="params"></span>) </span>&#123;</span><br><span class="line">    <span class="keyword">for</span> (<span class="keyword">let</span> i=<span class="number">0</span>; i&lt;<span class="number">100</span>; i++) &#123;               </span><br><span class="line">    &#125;</span><br><span class="line">    <span class="comment">// SyntaxError:</span></span><br><span class="line">    i += <span class="number">1</span>;</span><br><span class="line">&#125;</span><br><span class="line"><span class="comment">//foo1();</span></span><br><span class="line"><span class="comment">//3.常量,在ES6后使用</span></span><br><span class="line"><span class="keyword">const</span> PI = <span class="number">3.14</span>;<span class="comment">//const定义常量</span></span><br><span class="line"><span class="comment">//PI = 3; //报错</span></span><br><span class="line"><span class="built_in">console</span>.log(PI); <span class="comment">// 3.14</span></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment">//4.解构赋值:也可用于对象,也可以忽略某个值</span></span><br><span class="line"><span class="keyword">var</span> [x, y, z] = [<span class="string">'hello'</span>, <span class="string">'JavaScript'</span>, <span class="string">'ES6'</span>];</span><br><span class="line"><span class="built_in">console</span>.log(x+<span class="string">" -&gt; "</span>+y+<span class="string">"-&gt;"</span>+z);</span><br><span class="line"><span class="comment">//let [, , z] = ['hello', 'JavaScript', 'ES6'];</span></span><br></pre></td></tr></table></figure>
