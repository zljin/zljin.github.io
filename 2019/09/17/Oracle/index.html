        <h3 id="安装配置PLSQL"><a href="#安装配置PLSQL" class="headerlink" title="安装配置PLSQL"></a>安装配置PLSQL</h3><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br></pre></td><td class="code"><pre><span class="line">pl/sql 环境变量</span><br><span class="line">TNS_ADMIN=tnsnames.ora所在路径   //tnsnames.ora登录后记录保存ip的,一般在服务器端上的oracle目录下的文件夹下</span><br><span class="line">NLS_CHARACTERSET = ZHS16GBK   </span><br><span class="line">NLS_LANG = AMERICAN_AMERICA. ZHS16GBK</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">PL/SQL Developer</span><br><span class="line">1.配置instantclient</span><br><span class="line">	工具-&gt;首选项-&gt;连接-&gt;Oracle主目录名（主动检测为空）：D:\Program Files\instantclient_10_2（instantclient_10_2路径）</span><br><span class="line">	-&gt;OCI库（自动检测为空）：D:\Program Files\instantclient_10_2\oci.dll（oci.dll路径）</span><br><span class="line">2.添加帐号信息</span><br><span class="line">	登录历史-&gt;固定用户：south_br/br_south@fjbomc（登录名/密码）</span><br><span class="line">	勾选保持被组合的未排序的固定用户</span><br></pre></td></tr></table></figure>

<h3 id="基本概念和体系结构"><a href="#基本概念和体系结构" class="headerlink" title="基本概念和体系结构"></a>基本概念和体系结构</h3><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br></pre></td><td class="code"><pre><span class="line">数据库:</span><br><span class="line">	指的是数据的物理存储包括(数据文件ORA/DBF,控制文件,联机日志,参数文件)</span><br><span class="line">	这里的数据库是一个操作系统只有一个库(区别mysql)</span><br><span class="line">	</span><br><span class="line">	</span><br><span class="line">实例:</span><br><span class="line">	一个oracle实例由一系列的后台进程和内存结构组成.一个数据库可以有多个实例</span><br><span class="line">	</span><br><span class="line">用户:</span><br><span class="line">	用户在实例下创建</span><br><span class="line">	重要管理表的基本单位区别(在mysql中是数据库,在oracle中是用户)</span><br><span class="line">	</span><br><span class="line">	</span><br><span class="line">表空间:是oracle对物理数据库上相关数据文件(ORA或者DBF文件)的逻辑映射.</span><br><span class="line">每一个表空间由同一个磁盘上的一个或多个文件组成,这些文件叫数据文件,一个数据文件只能属于一个表空间</span><br><span class="line"></span><br><span class="line">数据文件:是数据库的物理存储单位</span><br></pre></td></tr></table></figure>

<h3 id="基本操作"><a href="#基本操作" class="headerlink" title="基本操作"></a>基本操作</h3><figure class="highlight sql"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br><span class="line">91</span><br><span class="line">92</span><br><span class="line">93</span><br><span class="line">94</span><br><span class="line">95</span><br><span class="line">96</span><br><span class="line">97</span><br><span class="line">98</span><br><span class="line">99</span><br><span class="line">100</span><br><span class="line">101</span><br><span class="line">102</span><br><span class="line">103</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">--创建表空间创建用户以及用户授权</span></span><br><span class="line"><span class="comment">--创建表空间</span></span><br><span class="line"><span class="keyword">create</span> <span class="keyword">tablespace</span> leonard</span><br><span class="line"><span class="keyword">datafile</span> <span class="string">'D:\leonard.dbf'</span></span><br><span class="line"><span class="keyword">size</span> <span class="number">100</span>m <span class="keyword">autoextend</span> <span class="keyword">on</span> <span class="keyword">next</span> <span class="number">10</span>m;</span><br><span class="line"></span><br><span class="line"><span class="comment">--删除表空间</span></span><br><span class="line"><span class="comment">--drop tablespace leonard;</span></span><br><span class="line"></span><br><span class="line"><span class="comment">--创建用户</span></span><br><span class="line"><span class="keyword">create</span> <span class="keyword">user</span> leonard </span><br><span class="line"><span class="keyword">identified</span> <span class="keyword">by</span> leonard</span><br><span class="line"><span class="keyword">default</span> <span class="keyword">tablespace</span> leonard;</span><br><span class="line"></span><br><span class="line"><span class="comment">--必须要给用户授权,否则无法登陆</span></span><br><span class="line"><span class="comment">--oracle数据库中常用的角色:</span></span><br><span class="line"><span class="comment">--connect --连接角色,基本巨额色色</span></span><br><span class="line"><span class="comment">--resource --开发者角色</span></span><br><span class="line"><span class="comment">--dba-- 超级管理员角色</span></span><br><span class="line"><span class="comment">--给leonard用户授予dba角色</span></span><br><span class="line"><span class="keyword">grant</span> dba <span class="keyword">to</span> leonard;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment">-- 表创建</span></span><br><span class="line"><span class="comment">-- oracle 的数据类型:varchar2 , number , data , clob, blob</span></span><br><span class="line"><span class="keyword">create</span> <span class="keyword">table</span> person(</span><br><span class="line">  pid <span class="built_in">number</span>(<span class="number">20</span>),</span><br><span class="line">  pname varchar2(<span class="number">10</span>)</span><br><span class="line">);</span><br><span class="line"></span><br><span class="line"><span class="comment">-- 修改表结构</span></span><br><span class="line"><span class="keyword">alter</span> <span class="keyword">table</span> person <span class="keyword">add</span> (gender <span class="built_in">number</span>(<span class="number">1</span>));</span><br><span class="line"><span class="keyword">alter</span> <span class="keyword">table</span> person <span class="keyword">modify</span> gender <span class="built_in">char</span>(<span class="number">2</span>);</span><br><span class="line"><span class="keyword">alter</span> <span class="keyword">table</span> person <span class="keyword">rename</span> <span class="keyword">column</span> gender <span class="keyword">to</span> sex;   </span><br><span class="line"><span class="keyword">alter</span> <span class="keyword">table</span> person <span class="keyword">drop</span> <span class="keyword">column</span> sex;</span><br><span class="line"></span><br><span class="line"><span class="comment">--添加一条记录</span></span><br><span class="line"><span class="keyword">insert</span> <span class="keyword">into</span> person (pid,pname) <span class="keyword">values</span> (<span class="number">1</span>,<span class="string">'小明'</span>);</span><br><span class="line"><span class="keyword">commit</span>;</span><br><span class="line"></span><br><span class="line"><span class="keyword">update</span> person <span class="keyword">set</span> <span class="keyword">name</span> = <span class="string">'小马'</span> <span class="keyword">where</span> pid = <span class="number">1</span>;</span><br><span class="line"><span class="keyword">commit</span>;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="keyword">select</span> * <span class="keyword">from</span> person;</span><br><span class="line"></span><br><span class="line"><span class="comment">-- 三个删除</span></span><br><span class="line"><span class="comment">-- 删除表中全部记录</span></span><br><span class="line"><span class="keyword">delete</span> <span class="keyword">from</span> person;</span><br><span class="line"><span class="comment">-- 删除表结构</span></span><br><span class="line"><span class="keyword">drop</span> <span class="keyword">table</span> person;</span><br><span class="line"><span class="comment">-- 先删除表,在创建表:相当于删除表中全部记录</span></span><br><span class="line"><span class="comment">-- 在数据量大的情况下,尤其在表中带有索引的情况下,该操作效率高.</span></span><br><span class="line"><span class="comment">-- 索引:提高查询效率,影响增删改的效率</span></span><br><span class="line"><span class="keyword">truncate</span>  <span class="keyword">table</span> person;</span><br><span class="line"></span><br><span class="line"><span class="comment">-- 序列不真的属于任何一张表,但是可以逻辑和表锁定</span></span><br><span class="line"><span class="comment">-- 序列:默认从1开始,依次递增,主要用来给主键赋值使用 </span></span><br><span class="line"><span class="comment">-- dual:虚表 只是补全语法,无任何意义</span></span><br><span class="line"><span class="keyword">create</span> <span class="keyword">sequence</span> s_person;</span><br><span class="line"><span class="keyword">select</span> s_person.nextval <span class="keyword">from</span> dual;</span><br><span class="line"><span class="keyword">select</span> s_person.currval <span class="keyword">from</span> dual;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment">-- 视图:提供查询的窗口,所有数据来自与原表</span></span><br><span class="line"><span class="comment">-- 创建视图必须有dba权限</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">create</span> <span class="keyword">table</span> emp <span class="keyword">as</span> <span class="keyword">select</span> * <span class="keyword">from</span> student;</span><br><span class="line"><span class="keyword">select</span> * <span class="keyword">from</span> emp;</span><br><span class="line"><span class="comment">--drop table emp;</span></span><br><span class="line"></span><br><span class="line"><span class="comment">--创建视图</span></span><br><span class="line"><span class="keyword">create</span> <span class="keyword">view</span> v_emp <span class="keyword">as</span> <span class="keyword">select</span> sname,sage <span class="keyword">from</span> emp;</span><br><span class="line"><span class="comment">--查询视图</span></span><br><span class="line"><span class="keyword">select</span> * <span class="keyword">from</span> v_emp;</span><br><span class="line"><span class="comment">--修改视图[能修改改变原表但不推荐]</span></span><br><span class="line"><span class="keyword">update</span> v_emp <span class="keyword">set</span> sage=<span class="string">'1'</span> <span class="keyword">where</span> sname = <span class="string">'张三'</span>;</span><br><span class="line"><span class="keyword">commit</span>;</span><br><span class="line"><span class="comment">-- 创建只读视图</span></span><br><span class="line"><span class="keyword">create</span> <span class="keyword">view</span> v_emp1 <span class="keyword">as</span> <span class="keyword">select</span> sname,sage <span class="keyword">from</span> emp <span class="keyword">with</span> <span class="keyword">read</span> <span class="keyword">only</span>;</span><br><span class="line"></span><br><span class="line"><span class="comment">-- 视图作用?</span></span><br><span class="line"><span class="comment">-- 第一:视图可以屏蔽掉一些敏感字段</span></span><br><span class="line"><span class="comment">-- 第二:保证总部和分部数据及时统一.</span></span><br><span class="line"></span><br><span class="line"><span class="comment">--索引</span></span><br><span class="line"><span class="comment">-- 索引的概念:索引就是在表的列上构建一个二叉树</span></span><br><span class="line"><span class="comment">-- 达到大幅度提高查询效率的目的,但是索引会影响增删改的效率</span></span><br><span class="line"></span><br><span class="line"><span class="comment">-- 创建单列索引</span></span><br><span class="line"><span class="keyword">create</span> <span class="keyword">index</span> idx_sname <span class="keyword">on</span> emp(sname);</span><br><span class="line"><span class="comment">-- 单例索引触发规则:条件必须是索引列中的原始值</span></span><br><span class="line"><span class="comment">-- 模糊查询,单行函数都会影响索引的触发.</span></span><br><span class="line"><span class="keyword">select</span> * <span class="keyword">from</span> emp <span class="keyword">where</span> sname=<span class="string">'张三'</span>;</span><br><span class="line"></span><br><span class="line"><span class="comment">-- 复合索引</span></span><br><span class="line"><span class="comment">-- 创建复合索引</span></span><br><span class="line"><span class="keyword">create</span> <span class="keyword">index</span> idx_snamesno <span class="keyword">on</span> emp(sname,sno);</span><br><span class="line"><span class="comment">-- 复合索引中的第一列是优先检索列</span></span><br><span class="line"><span class="comment">-- 如果要触发符合索引,必须包括有优先检索列中的原始值</span></span><br><span class="line"><span class="keyword">select</span> * <span class="keyword">from</span> emp <span class="keyword">where</span> sname=<span class="string">'张三'</span> <span class="keyword">and</span> sno=<span class="string">'s001'</span>; <span class="comment">--触发复合索引</span></span><br><span class="line"><span class="keyword">select</span> * <span class="keyword">from</span> emp <span class="keyword">where</span> sname=<span class="string">'张三'</span> <span class="keyword">or</span> sno=<span class="string">'s001'</span>; <span class="comment">--不触发索引</span></span><br><span class="line"><span class="keyword">select</span> * <span class="keyword">from</span> emp <span class="keyword">where</span> sname=<span class="string">'张三'</span>;<span class="comment">-- 触发单列索引</span></span><br></pre></td></tr></table></figure>
